server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — todas las rutas de React van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API — evita CORS en producción (mismo origen para el browser)
    location /api/ {
        proxy_pass https://suri-firuvet-ios-damii-api.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host suri-firuvet-ios-damii-api.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Proxy SOAP — mismo principio
    location /soap/ {
        proxy_pass https://suri-firuvet-api-soap.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header Host suri-firuvet-api-soap.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # Cache assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
